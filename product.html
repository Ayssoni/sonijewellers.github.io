<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Soni Jewellers</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- Live Rates Top Bar -->
    <div class="top-bar">
        <div class="container">
            📈 <span>Live Market Rates:</span> Gold (24K) - <span id="live-gold-price">Loading...</span> | Silver - <span id="live-silver-price">Loading...</span>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">SONI JEWELLERS<span>.</span></a>
            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    🛒
                    <span class="cart-badge" style="display: none;">0</span>
                </a>

    <!-- Product Detail Section -->
    <section class="section" style="padding-top: 40px;">

            <div id="product-detail-container" class="product-detail">

            <div id="related-products" class="products-grid">
                <!-- Injected via JS -->
            </div>
        </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; <span id="current-year"></span> Soni Jewellers. All Rights Reserved.</p>
            </div>
        </div>

    <!-- Scripts -->
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/shop.js?v=motion"></script>
    <script src="js/main.js?v=motion"></script>
    <script src="js/live-rates.js"></script>
