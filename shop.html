<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Soni Jewellers</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- Live Rates Top Bar -->
    <div class="top-bar">
        <div class="container">
            📈 <span>Live INR Rates:</span> Gold 24K - <span id="live-gold-price">Fetching live...</span> | Silver - <span id="live-silver-price">Fetching live...</span>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">SONI JEWELLERS<span>.</span></a>
            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    🛒
                    <span class="cart-badge" style="display: none;">0</span>
                </a>
                <div class="hamburger">☰</div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <h1>Our Collection</h1>
            <div class="breadcrumb">
                <a href="index.html">Home</a> / Shop
            </div>
        </div>
    </div>

    <!-- Shop Content -->
    <section class="section" style="padding-top: 0;">
        <div class="container">
            <div class="shop-container">
                
                <!-- Sidebar Filters -->
                <aside class="shop-sidebar">
                    <input type="text" id="search-input" class="search-bar" placeholder="Search products...">
                    
                    <div class="filter-group">
                        <h3 class="filter-title">Categories</h3>
                        <div class="filter-options">
                            <label><input type="checkbox" class="category-filter" value="Rings"> Rings</label>
                            <label><input type="checkbox" class="category-filter" value="Necklaces"> Necklaces</label>
                            <label><input type="checkbox" class="category-filter" value="Earrings"> Earrings</label>
                            <label><input type="checkbox" class="category-filter" value="Bracelets"> Bracelets</label>
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <h3 class="filter-title">Price Range</h3>
                        <div class="filter-options">
                            <input type="range" id="price-slider" min="0" max="400000" step="1000" value="400000" style="width: 100%;">
                            <p id="price-display" style="margin-top: 10px; font-weight: 500;">₹0 - ₹400,000</p>
                        </div>
                    </div>
                </aside>
                
                <!-- Product Grid -->
                <main>
                    <div id="shop-products" class="products-grid">
                        <!-- Products injected by JS -->
                    </div>
                </main>
                
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; <span id="current-year"></span> Soni Jewellers. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/shop.js?v=motion"></script>
    <script src="js/main.js?v=motion"></script>
    <script src="js/live-rates.js"></script>
    
    <script>
        // Check URL for category pre-selection
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('category');
            if (category) {
                const cb = document.querySelector(`.category-filter[value="${category}"]`);
                if (cb) {
                    cb.checked = true;
                    // trigger filter update
                    const event = new Event('change');
                    cb.dispatchEvent(event);
                }
            }
        });
    </script>
</body>
</html>
